<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>

<body>
<div id="nmbd-root">
  <!-- Your entire HTML structure remains exactly the same -->
  <header class="nmbd-header"> ... </header>
  <div class="nmbd-tabs"> ... </div>
  <!-- WORSHIP PANEL and ATM PANEL unchanged -->
  <!-- ... (all your panels, sidebar, map areas, etc.) ... -->
</div>

<div id="nmbd-loc-prompt"> ... </div>
<div id="nmbd-gmaps-toast"> ... </div>

<script>
(function(window,document){
  'use strict';
  function g(id){ return document.getElementById(id); }
  function ready(fn){ if(document.readyState!=='loading') fn(); else document.addEventListener('DOMContentLoaded',fn); }

  var maps = {};
  var _navActive = {worship:false, atm:false};

  /* Show / hide Clear button */
  function showClearBtn(tab){ g('nmbd-'+tab+'-clear-btn').classList.add('visible'); }
  function hideClearBtn(tab){ g('nmbd-'+tab+'-clear-btn').classList.remove('visible'); }

  function setNavActive(tab){
    _navActive[tab]=true;
    g('nmbd-'+tab+'-btn').disabled=true;
    g('nmbd-navclear-'+tab).classList.add('visible');
    showClearBtn(tab);
  }

  function clearNavActive(tab){
    _navActive[tab]=false;
    g('nmbd-'+tab+'-btn').disabled=false;
    g('nmbd-navclear-'+tab).classList.remove('visible');
    if(tab==='worship') fullClearWorship(true);
    if(tab==='atm') fullClearATM(true);
  }

  /* ====================== CACHE FIX ====================== */
  var _cache = {};

  function getCacheKey(q, radius) {
    return q + '|r=' + radius;   // Include radius in cache key
  }

  function overpassQuery(q, radius, onRetry){
    var cacheKey = getCacheKey(q, radius);
    var now = Date.now();

    // Use cache only if it's recent (3 minutes) and has results
    if(_cache[cacheKey] && _cache[cacheKey].count > 0 && (now - _cache[cacheKey].ts) < 180000){
      return Promise.resolve(_cache[cacheKey].data);
    }

    var body = 'data=' + encodeURIComponent(q);
    return race(body)
      .then(function(d){
        if(d.elements && d.elements.length > 0){
          _cache[cacheKey] = {ts: Date.now(), data: d, count: d.elements.length};
        }
        return d;
      })
      .catch(function(){
        if(onRetry) onRetry();
        return new Promise(function(r){ setTimeout(r, 1500); })
          .then(function(){ return race(body); })
          .then(function(d){
            if(d.elements && d.elements.length > 0){
              _cache[cacheKey] = {ts: Date.now(), data: d, count: d.elements.length};
            }
            return d;
          });
      });
  }
  /* ====================== END CACHE FIX ====================== */

  /* Full Clear Functions */
  function fullClearWorship(fromNav){
    maps.worship.eachLayer(function(layer){
      if(layer instanceof L.Marker) maps.worship.removeLayer(layer);
    });

    document.querySelectorAll('#nmbd-worship-chips .nmbd-chip-cb').forEach(function(cb){
      cb.checked = true;
    });

    g('nmbd-worship-radius').value = 3000;
    g('nmbd-worship-rval').textContent = '3km';

    _cache = {};                    // Full wipe on manual clear
    g('nmbd-worship-count').textContent = '';
    g('nmbd-worship-badge').textContent = 'Ready — search again';
    g('nmbd-worship-locinfo').innerHTML = '';
    g('nmbd-worship-list').innerHTML =
      '<div class="nmbd-status"><div class="nmbd-status-icon">🕌</div>Session cleared.<br>All filters reset. Click search to find worship places.</div>';

    _navActive.worship = false;
    g('nmbd-worship-btn').disabled = false;
    g('nmbd-navclear-worship').classList.remove('visible');
    hideClearBtn('worship');

    maps.worship.invalidateSize();
    setTimeout(function(){ maps.worship.setView([23.8103, 90.4125], 13); }, 100);
  }

  function fullClearATM(fromNav){
    maps.atm.eachLayer(function(layer){
      if(layer instanceof L.Marker) maps.atm.removeLayer(layer);
    });

    g('nmbd-bank-filter').value = '';
    g('nmbd-atm-radius').value = 2000;
    g('nmbd-atm-rval').textContent = '2km';

    _cache = {};                    // Full wipe on manual clear
    g('nmbd-atm-count').textContent = '';
    g('nmbd-atm-badge').textContent = 'Ready — search again';
    g('nmbd-atm-locinfo').innerHTML = '';
    g('nmbd-atm-list').innerHTML =
      '<div class="nmbd-status"><div class="nmbd-status-icon">🏧</div>Session cleared.<br>Change radius if needed and click search.</div>';

    _navActive.atm = false;
    g('nmbd-atm-btn').disabled = false;
    g('nmbd-navclear-atm').classList.remove('visible');
    hideClearBtn('atm');

    maps.atm.invalidateSize();
    setTimeout(function(){ maps.atm.setView([23.8103, 90.4125], 14); }, 100);
  }

  function clearWorship(){
    maps.worship.eachLayer(function(layer){
      if(layer instanceof L.Marker) maps.worship.removeLayer(layer);
    });
    g('nmbd-worship-count').textContent = '';
    g('nmbd-worship-badge').textContent = 'Searching…';
    g('nmbd-worship-list').innerHTML = '';
  }

  function clearATM(){
    maps.atm.eachLayer(function(layer){
      if(layer instanceof L.Marker) maps.atm.removeLayer(layer);
    });
    g('nmbd-atm-count').textContent = '';
    g('nmbd-atm-badge').textContent = 'Searching…';
    g('nmbd-atm-list').innerHTML = '';
  }

  /* Rest of your code (location, mirrors, race, etc.) remains unchanged */
  var _locResolve=null, _locReject=null, _locFallbackTimer=null;
  var _inIframe=(function(){ try{ return window.self!==window.top; }catch(e){ return true; } })();

  window.addEventListener('message',function(e){
    var d=e.data;
    if(!d||!d.type) return;
    if(d.type==='nmbd-loc'){
      clearTimeout(_locFallbackTimer);
      if(_locResolve){ _locResolve({lat:d.lat,lon:d.lon,acc:d.acc||9999}); _locResolve=null; _locReject=null; }
    }
    if(d.type==='nmbd-loc-err'){
      clearTimeout(_locFallbackTimer);
      if(_locReject){ _locReject(d.msg||'Location denied'); _locResolve=null; _locReject=null; }
    }
  });

  function postToParent(msg){ try{ window.parent.postMessage(msg,'*'); }catch(e){} }

  function rawGeolocate(){ /* unchanged */ }
  function getLocation(){ /* unchanged */ }
  function roundLoc(v){ return Math.round(v*1000)/1000; }

  var MIRRORS=[ /* unchanged */ ];
  var TIMEOUT=28000, STAGGER=400, RETRY_WAIT=1500;

  function tryMirror(url,body){ /* unchanged */ }
  function race(body){ /* unchanged */ }

  /* ====================== Updated searchWorship ====================== */
  function searchWorship(){
    if(_navActive.worship) return;
    var btn=g('nmbd-worship-btn'), list=g('nmbd-worship-list'), badge=g('nmbd-worship-badge'), li=g('nmbd-worship-locinfo');
    var types=[];
    document.querySelectorAll('#nmbd-worship-chips .nmbd-chip-cb:checked').forEach(function(c){ types.push(c.dataset.type); });

    if(!types.length){
      list.innerHTML='<div style="padding:9px"><div class="nmbd-err">⚠️ Select at least one type.</div></div>';
      return;
    }

    hideClearBtn('worship');
    btn.disabled=true;
    btn.innerHTML=spin()+' Locating…';
    clearWorship();

    list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Getting your location…</div>';
    showLocPrompt();

    var radius = parseInt(g('nmbd-worship-radius').value,10);

    getLocation()
      .then(function(loc){
        hideLocPrompt();
        var lat=roundLoc(loc.lat), lon=roundLoc(loc.lon);
        li.innerHTML='<div class="nmbd-loc-pill">✅ '+lat+', '+lon+(loc.acc?' (±'+Math.round(loc.acc)+'m)':'')+'</div>';

        list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Searching within '+fmtDist(radius)+'…</div>';

        L.marker([lat, lon], {icon: USER_ICON}).addTo(maps.worship).bindPopup('<b>📍 You are here</b>');

        var q = '[out:json][timeout:30][maxsize:2097152];node["amenity"="place_of_worship"](around:'+radius+','+lat+','+lon+');out;';

        return overpassQuery(q, radius, function(){
          list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Retrying on backup server…</div>';
        }).then(function(d){
          var places=(d.elements||[]).map(function(el){
            var lt=el.lat||(el.center&&el.center.lat), ln=el.lon||(el.center&&el.center.lon);
            if(!lt||!ln) return null;
            var tp=classify(el.tags||{});
            return {id:el.id,lat:lt,lon:ln,type:tp,dist:haversine(lat,lon,lt,ln),tags:el.tags||{}};
          }).filter(function(p){ return p && types.indexOf(p.type) > -1; });

          places.sort(function(a,b){ return a.dist-b.dist; });
          renderWorship(places, {lat:lat,lon:lon}, radius);
        });
      })
      .catch(function(err){
        hideLocPrompt();
        if(typeof err==='string' && (err.indexOf('denied')>-1 || err.indexOf('not supported')>-1)){
          list.innerHTML='<div style="padding:9px"><div class="nmbd-err">📍 Location permission denied.<div class="nmbd-err-detail">Please allow location access in your browser settings and try again.</div></div></div>';
          badge.textContent='No location';
        } else {
          showError(list,badge,function(){ btn.disabled=false; searchWorship(); });
        }
      })
      .finally(function(){
        btn.disabled=false;
        btn.innerHTML='📍 Find Nearby Worship Places';
        showClearBtn('worship');
      });
  }

  /* Similarly update searchATM (same pattern) */
  function searchATM(){
    if(_navActive.atm) return;
    var btn=g('nmbd-atm-btn'), list=g('nmbd-atm-list'), badge=g('nmbd-atm-badge'), li=g('nmbd-atm-locinfo');
    var bf=(g('nmbd-bank-filter').value||'').toLowerCase();

    hideClearBtn('atm');
    btn.disabled=true;
    btn.innerHTML=spin()+' Locating…';
    clearATM();

    list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Getting your location…</div>';
    showLocPrompt();

    var radius = parseInt(g('nmbd-atm-radius').value,10);

    getLocation()
      .then(function(loc){
        hideLocPrompt();
        var lat=roundLoc(loc.lat), lon=roundLoc(loc.lon);
        li.innerHTML='<div class="nmbd-loc-pill">✅ '+lat+', '+lon+(loc.acc?' (±'+Math.round(loc.acc)+'m)':'')+'</div>';

        list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Searching within '+fmtDist(radius)+'…</div>';

        L.marker([lat, lon], {icon: USER_ICON}).addTo(maps.atm).bindPopup('<b>📍 You are here</b>');

        var q='[out:json][timeout:30][maxsize:2097152];(node["amenity"="atm"](around:'+radius+','+lat+','+lon+');node["amenity"="bank"](around:'+radius+','+lat+','+lon+'););out;';

        return overpassQuery(q, radius, function(){
          list.innerHTML='<div class="nmbd-status"><div class="nmbd-spinner"></div>Retrying on backup server…</div>';
        }).then(function(d){
          var atms=(d.elements||[]).map(function(e){
            if(!e.lat||!e.lon) return null;
            var t=e.tags||{}, nm=t.operator||t.name||t.brand||'Unknown Bank';
            return {id:e.id,lat:e.lat,lon:e.lon,name:nm,dist:haversine(lat,lon,e.lat,e.lon),tags:t,type:t.amenity};
          }).filter(function(a){ return a && (!bf || a.name.toLowerCase().includes(bf)); });

          atms.sort(function(a,b){ return a.dist-b.dist; });
          renderATM(atms, {lat:lat,lon:lon}, bf, radius);
        });
      })
      .catch(function(err){
        hideLocPrompt();
        if(typeof err==='string' && (err.indexOf('denied')>-1 || err.indexOf('not supported')>-1)){
          list.innerHTML='<div style="padding:9px"><div class="nmbd-err">📍 Location permission denied.<div class="nmbd-err-detail">Please allow location access in your browser settings and try again.</div></div></div>';
          badge.textContent='No location';
        } else {
          showError(list,badge,function(){ btn.disabled=false; searchATM(); });
        }
      })
      .finally(function(){
        btn.disabled=false;
        btn.innerHTML='📍 Find Nearby ATMs';
        showClearBtn('atm');
      });
  }

  /* Rest of your functions (initMaps, switchTab, haversine, fmtDist, mkIcon, classify, renderWorship, renderATM, etc.) remain exactly the same */

  function initMaps(){ /* unchanged */ }
  function switchTab(tab){ /* unchanged */ }
  function haversine(lat1,lon1,lat2,lon2){ /* unchanged */ }
  function fmtDist(m){ /* unchanged */ }
  function mkIcon(emoji,bg){ /* unchanged */ }
  var WI = { /* unchanged */ };
  var ATM_ICON = mkIcon('🏧','#1a5a6a'), USER_ICON = mkIcon('👤','#0e6e6e');
  function classify(tags){ /* unchanged */ }
  var WE = { /* unchanged */ };
  var WL = { /* unchanged */ };
  function showLocPrompt(){ /* unchanged */ }
  function hideLocPrompt(){ /* unchanged */ }
  function spin(){ /* unchanged */ }
  function showError(list,badge,retryFn){ /* unchanged */ }
  function popupNavBtn(id,dLat,dLon,dName,tab){ /* unchanged */ }

  /* renderWorship and renderATM remain unchanged */

  function renderWorship(places,loc,radius){ /* unchanged - your original version */ }
  function renderATM(atms,loc,bf,radius){ /* unchanged - your original version */ }

  /* INIT */
  ready(function(){
    if(typeof L==='undefined'){ console.error('NearMe BD: Leaflet not loaded.'); return; }
    initMaps();

    g('nmbd-tab-worship').addEventListener('click',function(){ switchTab('worship'); });
    g('nmbd-tab-atm').addEventListener('click', function(){ switchTab('atm'); });

    g('nmbd-worship-btn').addEventListener('click', searchWorship);
    g('nmbd-atm-btn').addEventListener('click', searchATM);

    g('nmbd-navclear-worship-btn').addEventListener('click',function(){ clearNavActive('worship'); });
    g('nmbd-navclear-atm-btn').addEventListener('click', function(){ clearNavActive('atm'); });

    g('nmbd-worship-clear-btn').addEventListener('click', function(){ fullClearWorship(false); });
    g('nmbd-atm-clear-btn').addEventListener('click', function(){ fullClearATM(false); });

    g('nmbd-worship-radius').addEventListener('input',function(){
      g('nmbd-worship-rval').textContent = Math.round(this.value/1000*10)/10 + 'km';
    });
    g('nmbd-atm-radius').addEventListener('input', function(){
      g('nmbd-atm-rval').textContent = Math.round(this.value/1000*10)/10 + 'km';
    });
  });
})(window,document);
</script>
